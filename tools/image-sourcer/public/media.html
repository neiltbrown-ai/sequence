<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>In Sequence — Media Sourcer</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --dark: #111111; --charcoal: #1A1A1A; --deep: #2A2A2A; --slate: #3D3A38;
  --mid: #4A4745; --light: #F2EFE9; --muted: #888888; --accent: #C8F04B;
  --gold: #E8D5A3; --red: #E87B5A; --green: #8FD16A;
  --font-sans: 'Inter','Helvetica Neue',Arial,sans-serif;
  --font-mono: 'IBM Plex Mono','Courier New',monospace;
}
body { background: var(--dark); color: var(--light); font-family: var(--font-sans); line-height: 1.5; min-height: 100vh; }
.header { position: sticky; top: 0; z-index: 100; background: var(--dark); border-bottom: 1px solid var(--slate); padding: 16px 24px; }
.header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
.header .sub { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-top: 2px; }
.header a { color: var(--accent); text-decoration: none; font-family: var(--font-mono); font-size: 11px; }
.wrap { max-width: 1280px; margin: 0 auto; padding: 24px; }
.controls { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; background: var(--charcoal); border: 1px solid var(--slate); border-radius: 8px; padding: 16px; margin-bottom: 20px; }
.controls input[type=text], .controls input[type=number] { background: var(--deep); border: 1px solid var(--slate); color: var(--light); font-family: var(--font-mono); padding: 8px 10px; border-radius: 6px; font-size: 13px; }
.controls input[type=text] { min-width: 200px; }
.controls input[type=number] { width: 64px; }
.controls label { font-size: 12px; font-family: var(--font-mono); color: var(--muted); display: inline-flex; align-items: center; gap: 5px; cursor: pointer; }
.controls label input { accent-color: var(--accent); }
.btn { background: var(--accent); color: var(--dark); border: none; padding: 9px 16px; border-radius: 6px; font-weight: 600; font-size: 13px; cursor: pointer; font-family: var(--font-sans); }
.btn.secondary { background: var(--deep); color: var(--light); border: 1px solid var(--slate); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.status-line { font-family: var(--font-mono); font-size: 12px; color: var(--muted); margin-bottom: 16px; min-height: 18px; }
.status-line.err { color: var(--red); }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
.card { background: var(--charcoal); border: 1px solid var(--slate); border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
.card.approved { border-color: var(--green); }
.card.rejected { opacity: 0.4; }
.thumb { width: 100%; aspect-ratio: 16/10; object-fit: cover; background: var(--deep); display: block; }
.card-body { padding: 12px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
.badges { display: flex; flex-wrap: wrap; gap: 5px; }
.badge { font-family: var(--font-mono); font-size: 10px; padding: 2px 6px; border-radius: 4px; background: var(--deep); color: var(--muted); border: 1px solid var(--slate); }
.badge.kind { color: var(--gold); }
.badge.lic { color: var(--accent); }
.badge.status-approved { color: var(--green); border-color: var(--green); }
.badge.status-rejected { color: var(--red); border-color: var(--red); }
.meta { font-family: var(--font-mono); font-size: 11px; color: var(--muted); word-break: break-word; }
.meta a { color: var(--muted); }
.actions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: auto; }
.actions .btn { padding: 6px 10px; font-size: 11px; }
.actions .reject { background: transparent; border: 1px solid var(--red); color: var(--red); }
.empty { color: var(--muted); font-family: var(--font-mono); font-size: 13px; padding: 40px 0; text-align: center; }
.spin { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--slate); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
.panel { background: var(--charcoal); border: 1px solid var(--slate); border-radius: 8px; padding: 16px; margin-bottom: 22px; }
.panel-head { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
.panel-head strong { font-size: 14px; }
.panel-head input[type=text] { flex: 1; min-width: 220px; background: var(--deep); border: 1px solid var(--slate); color: var(--light); font-family: var(--font-mono); padding: 8px 10px; border-radius: 6px; font-size: 13px; }
.seg { display: inline-flex; gap: 10px; font-family: var(--font-mono); font-size: 12px; color: var(--muted); }
.seg label { display: inline-flex; gap: 4px; align-items: center; cursor: pointer; }
.seg input { accent-color: var(--accent); }
.chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.chip { font-family: var(--font-mono); font-size: 11px; padding: 4px 9px; border-radius: 14px; background: var(--deep); color: var(--gold); border: 1px solid var(--slate); cursor: pointer; }
.chip:hover { color: var(--light); border-color: var(--gold); }
.manual-row { display: flex; gap: 8px; margin-top: 10px; }
.manual-row input { flex: 1; background: var(--deep); border: 1px solid var(--slate); color: var(--light); font-family: var(--font-mono); padding: 8px 10px; border-radius: 6px; font-size: 12px; }
.manual-row select { background: var(--deep); border: 1px solid var(--slate); color: var(--light); font-family: var(--font-mono); font-size: 12px; border-radius: 6px; padding: 0 8px; }
.grid.results { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; margin-top: 12px; }
.grid.results .thumb { aspect-ratio: 16/10; }
.grid.results .card-body { padding: 8px; gap: 6px; }
.section-title { font-size: 13px; font-family: var(--font-mono); color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin: 4px 0 12px; }
.result-add { width: 100%; }
.result-card.added { opacity: 0.45; }
.spacer { flex: 1; }
.btn.ghost { background: transparent; border: 1px solid var(--slate); color: var(--muted); padding: 9px 11px; }
.btn.ghost:hover { color: var(--light); }
.autofill-opts { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; background: var(--charcoal); border: 1px solid var(--slate); border-radius: 8px; padding: 10px 14px; margin: -10px 0 16px; }
.autofill-opts label { font-size: 12px; font-family: var(--font-mono); color: var(--muted); display: inline-flex; gap: 5px; align-items: center; }
.autofill-opts input[type=number] { width: 56px; background: var(--deep); border: 1px solid var(--slate); color: var(--light); font-family: var(--font-mono); padding: 6px 8px; border-radius: 6px; }
.autofill-opts input[type=checkbox] { accent-color: var(--accent); }
</style>
</head>
<body>
<div class="header">
  <h1>Media Sourcer <span style="color:var(--muted);font-weight:400">— case-study B-roll</span></h1>
  <div class="sub">Source real imagery / video / screen-recordings of a subject → review → approve into the Remotion work/ pile · <a href="/index.html">← Image Sourcer</a></div>
</div>
<div class="wrap">
  <div class="controls">
    <input type="text" id="slug" placeholder="case slug (e.g. a24)" />
    <button class="btn secondary" id="loadBtn">Load</button>
    <button class="btn secondary" id="finalizeBtn" title="Rebuild work/assets.json + coverage.json from approved assets">Finalize → assets.json</button>
    <span class="spacer"></span>
    <button class="btn secondary" id="sourceBtn" title="Quick automatic grab (uses options →)">⚡ Auto-fill</button>
    <button class="btn ghost" id="optsBtn" title="auto-fill options">⚙</button>
  </div>
  <div class="autofill-opts" id="autofillOpts" hidden>
    <span class="seg">
      <label><input type="checkbox" class="kind" value="stills" checked> stills</label>
      <label><input type="checkbox" class="kind" value="broll" checked> b-roll</label>
      <label><input type="checkbox" class="kind" value="screen"> screen-rec</label>
      <label><input type="checkbox" class="kind" value="rec-video"> rec-video</label>
      <label><input type="checkbox" class="kind" value="video"> video</label>
    </span>
    <label>count <input type="number" id="max" value="8" min="1" max="40"></label>
    <label><input type="checkbox" id="allowvid"> allow yt-dlp download</label>
  </div>
  <div class="status-line" id="status"></div>
  <div class="status-line" id="coverage"></div>

  <div class="panel" id="browsePanel">
    <div class="panel-head">
      <strong>Find media</strong>
      <span class="seg">
        <label><input type="radio" name="searchkind" value="image" checked> images</label>
        <label><input type="radio" name="searchkind" value="video"> videos</label>
        <label><input type="radio" name="searchkind" value="broll"> b-roll</label>
      </span>
      <input type="text" id="q" placeholder="search term (e.g. George Lucas 1977 on set) — or click a query below" />
      <button class="btn" id="searchBtn">Search</button>
    </div>
    <div class="chips" id="chips"></div>
    <div class="manual-row">
      <input type="text" id="manualUrl" placeholder="…or paste an image / video / page URL" />
      <select id="manualAction">
        <option value="extract-images">extract images (gallery/page)</option>
        <option value="image">image</option>
        <option value="screenrec-video">screen-rec video</option>
        <option value="screenrec-page">screen-rec page</option>
        <option value="video-file">download video file</option>
      </select>
      <button class="btn secondary" id="addUrlBtn">Go</button>
    </div>
    <div class="status-line" id="searchStatus"></div>
    <div class="grid results" id="results"></div>
  </div>

  <h2 class="section-title">Review queue</h2>
  <div class="grid" id="grid"></div>
</div>
<script>
const $ = (id) => document.getElementById(id);
const status = (msg, err) => { const s = $('status'); s.innerHTML = msg; s.className = 'status-line' + (err ? ' err' : ''); };
const fileUrl = (p) => `/api/media/file?path=${encodeURIComponent(p)}`;
function showCoverage(cov) {
  const el = $('coverage');
  if (!cov) { el.textContent = ''; return; }
  const ents = Object.entries(cov.entities || {});
  const parts = ents.map(([k, v]) => `${k}: ${v.strength} (${v.images}i/${v.videos}v)`);
  const flags = [cov.needsPortrait ? 'needs portrait' : '', cov.needsBRoll ? 'needs b-roll' : ''].filter(Boolean);
  el.innerHTML = (parts.length ? 'coverage — ' + parts.join(' · ') : '') + (flags.length ? `  ⚠ ${flags.join(', ')}` : '');
}

async function api(path, body) {
  const r = await fetch(path, {
    method: body ? 'POST' : 'GET',
    headers: body ? { 'Content-Type': 'application/json' } : undefined,
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || r.status);
  return data;
}

function card(slug, e) {
  const el = document.createElement('div');
  el.className = 'card' + (e.status === 'approved' ? ' approved' : e.status === 'rejected' ? ' rejected' : '');
  const isImg = e.kind === 'image';
  const preview = isImg
    ? `<img class="thumb" src="${fileUrl(e.file)}" loading="lazy" />`
    : `<video class="thumb" src="${fileUrl(e.file)}" muted playsinline preload="metadata" onmouseover="this.play()" onmouseout="this.pause()"></video>`;
  const dur = e.durationSec ? `${e.durationSec.toFixed(1)}s` : '';
  const dims = e.width ? `${e.width}×${e.height}` : '';
  el.innerHTML = `
    ${preview}
    <div class="card-body">
      <div class="badges">
        <span class="badge kind">${e.kind}</span>
        ${dims ? `<span class="badge">${dims}</span>` : ''}
        ${dur ? `<span class="badge">${dur}</span>` : ''}
        <span class="badge lic">${e.licenseGuess || 'unknown'}</span>
        ${e.status !== 'candidate' ? `<span class="badge status-${e.status}">${e.status}${e.role ? ' · ' + e.role : ''}</span>` : ''}
      </div>
      <div class="meta">${e.source || ''}${e.query ? ' · "' + e.query + '"' : ''}${e.sourceUrl ? ` · <a href="${e.sourceUrl}" target="_blank" rel="noopener">source ↗</a>` : ''}</div>
      ${e.rightsNote ? `<div class="meta" style="color:var(--gold)">⚠ ${e.rightsNote}</div>` : ''}
      <div class="actions"></div>
    </div>`;
  const actions = el.querySelector('.actions');
  if (e.status === 'candidate') {
    const mk = (label, role) => {
      const b = document.createElement('button');
      b.className = 'btn'; b.textContent = label;
      b.onclick = async () => {
        b.disabled = true; status(`<span class="spin"></span> Approving + enriching…`);
        try { const r = await api('/api/media/approve', { slug, id: e.id, role }); showCoverage(r.coverage); status('Approved → work/. assets.json updated.'); load(slug); }
        catch (x) { status(x.message, true); b.disabled = false; }
      };
      return b;
    };
    if (isImg) actions.appendChild(mk('Portrait', 'portrait'));
    actions.appendChild(mk(isImg ? 'Still' : 'Clip', isImg ? 'still' : 'clip'));
    const rej = document.createElement('button');
    rej.className = 'btn reject'; rej.textContent = 'Reject';
    rej.onclick = async () => { try { const r = await api('/api/media/reject', { slug, id: e.id }); showCoverage(r.coverage); load(slug); } catch (x) { status(x.message, true); } };
    actions.appendChild(rej);
  } else if (e.status === 'approved') {
    // un-approve: delete the work file + drop from assets.json (handles duplicates)
    const rm = document.createElement('button');
    rm.className = 'btn reject'; rm.textContent = 'Remove';
    rm.title = 'Delete this approved asset from work/ + assets.json';
    rm.onclick = async () => {
      rm.disabled = true; status(`<span class="spin"></span> Removing…`);
      try { const r = await api('/api/media/reject', { slug, id: e.id }); showCoverage(r.coverage); status('Removed from work/ + assets.json.'); load(slug); }
      catch (x) { status(x.message, true); rm.disabled = false; }
    };
    actions.appendChild(rm);
  }
  return el;
}

function render(slug, manifest) {
  const grid = $('grid');
  grid.innerHTML = '';
  // hide rejected (their files are deleted); kept in the manifest for de-dupe
  const visible = manifest.filter((e) => e.status !== 'rejected');
  if (!visible.length) { grid.innerHTML = '<div class="empty">No assets yet. Use Find media above, or ⚡ Auto-fill.</div>'; return; }
  const order = { candidate: 0, approved: 1 };
  visible.sort((a, b) => (order[a.status] - order[b.status]));
  for (const e of visible) grid.appendChild(card(slug, e));
  const c = visible.filter((e) => e.status === 'candidate').length;
  const a = visible.filter((e) => e.status === 'approved').length;
  status(`${visible.length} assets · ${c} pending review · ${a} approved into work/`);
}

async function load(slug) {
  if (!slug) return;
  try {
    const { manifest, coverage } = await api(`/api/media/manifest/${encodeURIComponent(slug)}`);
    render(slug, manifest);
    showCoverage(coverage); // this case's coverage (or clears it)
  } catch (x) { status(x.message, true); }
}

// Clear stale per-case UI when the slug changes (so one case's coverage/queue/
// results don't linger while you switch to another).
function resetForSlug() {
  showCoverage(null);
  $('grid').innerHTML = '';
  $('results').innerHTML = '';
  $('chips').innerHTML = '';
  $('searchStatus').innerHTML = '';
  status('');
}
$('slug').addEventListener('input', resetForSlug);

$('loadBtn').onclick = () => load($('slug').value.trim());

$('finalizeBtn').onclick = async () => {
  const slug = $('slug').value.trim();
  if (!slug) return status('Enter a case slug first.', true);
  $('finalizeBtn').disabled = true;
  status(`<span class="spin"></span> Enriching approved assets → work/assets.json …`);
  try {
    const { count, coverage } = await api('/api/media/finalize', { slug });
    status(`Wrote work/assets.json (${count} approved asset${count === 1 ? '' : 's'} enriched) + coverage.json.`);
    showCoverage(coverage);
  } catch (x) { status(x.message, true); }
  $('finalizeBtn').disabled = false;
};

$('optsBtn').onclick = () => { const o = $('autofillOpts'); o.hidden = !o.hidden; };

$('sourceBtn').onclick = async () => {
  const slug = $('slug').value.trim();
  if (!slug) return status('Enter a case slug first.', true);
  const kinds = [...document.querySelectorAll('.kind:checked')].map((c) => c.value);
  if (!kinds.length) return status('Pick at least one media type.', true);
  const max = parseInt($('max').value, 10) || 8;
  const allowVideoDownload = $('allowvid').checked;
  $('sourceBtn').disabled = true;
  showCoverage(null); // don't show the previous case's coverage during the run
  status(`<span class="spin"></span> Planning + searching + downloading (this can take a minute)…`);
  try {
    const { added, manifest } = await api('/api/media/source', { slug, kinds, max, allowVideoDownload });
    render(slug, manifest);
    showCoverage((await api(`/api/media/manifest/${encodeURIComponent(slug)}`)).coverage);
    status(`Sourced ${added.length} new candidate(s). Review below.`);
    loadChips(slug); // refresh query chips from the freshly-saved plan
  } catch (x) { status(x.message, true); }
  $('sourceBtn').disabled = false;
};

// ── Browse & pick ───────────────────────────────────────────────────────────
const searchStatus = (msg, err) => { const s = $('searchStatus'); s.innerHTML = msg; s.className = 'status-line' + (err ? ' err' : ''); };
const searchKind = () => document.querySelector('input[name="searchkind"]:checked').value;

async function loadChips(slug) {
  const box = $('chips');
  box.innerHTML = '';
  if (!slug) return;
  let plan;
  try { ({ plan } = await api(`/api/media/plan/${encodeURIComponent(slug)}`)); } catch { return; }
  if (!plan) { box.innerHTML = '<span class="meta">No suggested queries yet — type a search above, or run ⚡ Auto-fill once to generate them.</span>'; return; }
  const k = searchKind();
  const qs = (k === 'video' ? plan.video_queries : k === 'broll' ? plan.broll_queries : plan.image_queries) || [];
  for (const q of qs) {
    const c = document.createElement('span');
    c.className = 'chip'; c.textContent = q;
    c.onclick = () => { $('q').value = q; doSearch(); };
    box.appendChild(c);
  }
}

function resultCard(slug, r) {
  const el = document.createElement('div');
  el.className = 'card result-card' + (r.inManifest ? ' added' : '');
  const isVid = r.kind === 'video' || searchKind() !== 'image';
  // direct-file clips (Pexels/Pixabay b-roll) hover-play; web videos show a thumb
  const preview = r.previewable
    ? `<video class="thumb" src="${r.full}" poster="${r.thumb || ''}" muted loop playsinline preload="none" onmouseover="this.preload='auto';this.play()" onmouseout="this.pause()"></video>`
    : `<img class="thumb" src="${r.thumb || r.full}" loading="lazy" />`;
  const dims = r.width ? `${r.width}×${r.height}` : '';
  el.innerHTML = `
    ${preview}
    <div class="card-body">
      <div class="badges">
        ${dims ? `<span class="badge">${dims}</span>` : ''}
        <span class="badge lic">${r.licenseGuess || ''}</span>
      </div>
      <div class="meta">${r.source || ''}${(r.pageUrl || r.sourceUrl) ? ` · <a href="${r.pageUrl || r.sourceUrl}" target="_blank" rel="noopener">src ↗</a>` : ''}</div>
      <div class="actions"></div>
    </div>`;
  const actions = el.querySelector('.actions');
  // addAction comes from the server: image · screenrec-video (web video) · video-file (Pexels stock)
  const action = r.addAction || (isVid ? 'screenrec-video' : 'image');
  const labels = { image: '+ Add', 'video-file': '+ Add clip', 'screenrec-video': 'Screen-record' };
  const busy = { image: 'adding…', 'video-file': 'downloading…', 'screenrec-video': 'recording…' };
  const addBtn = document.createElement('button');
  addBtn.className = 'btn result-add';
  addBtn.textContent = r.inManifest ? 'added ✓' : (labels[action] || '+ Add');
  addBtn.disabled = !!r.inManifest;
  addBtn.onclick = async () => {
    addBtn.disabled = true; addBtn.textContent = busy[action] || 'adding…';
    try {
      const res = await api('/api/media/add', { slug, url: r.full, action, query: r.query, source: r.source, sourceUrl: r.sourceUrl, licenseGuess: r.licenseGuess });
      addBtn.textContent = action === 'screenrec-video' && res.count > 1 ? `added ${res.count} clips ✓` : 'added ✓';
      el.classList.add('added');
      load(slug); // refresh review queue
    } catch (x) { addBtn.disabled = false; addBtn.textContent = 'retry'; searchStatus(x.message, true); }
  };
  actions.appendChild(addBtn);
  return el;
}

async function doSearch() {
  const slug = $('slug').value.trim();
  if (!slug) return status('Enter a case slug first.', true);
  const query = $('q').value.trim();
  const kind = searchKind();
  $('searchBtn').disabled = true;
  searchStatus(`<span class="spin"></span> Searching ${kind}s…`);
  try {
    const { results } = await api('/api/media/search', { slug, query, kind });
    const grid = $('results');
    grid.innerHTML = '';
    if (!results.length) { grid.innerHTML = '<div class="empty">No results. Try a different term.</div>'; }
    for (const r of results) grid.appendChild(resultCard(slug, r));
    searchStatus(`${results.length} result(s)${query ? ` for “${query}”` : ' (plan queries)'} — click to add. ${kind === 'video' ? 'Each capture takes ~20s.' : ''}`);
  } catch (x) { searchStatus(x.message, true); }
  $('searchBtn').disabled = false;
}

$('searchBtn').onclick = doSearch;
$('q').addEventListener('keydown', (e) => { if (e.key === 'Enter') doSearch(); });
document.querySelectorAll('input[name="searchkind"]').forEach((r) => r.addEventListener('change', () => loadChips($('slug').value.trim())));

$('addUrlBtn').onclick = async () => {
  const slug = $('slug').value.trim();
  const url = $('manualUrl').value.trim();
  if (!slug || !url) return searchStatus('Enter a case slug and a URL.', true);
  const action = $('manualAction').value;
  $('addUrlBtn').disabled = true;
  try {
    if (action === 'extract-images') {
      // scrape a gallery/page → show its images in the results grid to pick
      searchStatus(`<span class="spin"></span> Extracting images from page (scrolling to load all)…`);
      const { results } = await api('/api/media/extract', { slug, url });
      const grid = $('results');
      grid.innerHTML = '';
      if (!results.length) grid.innerHTML = '<div class="empty">No images found on that page.</div>';
      for (const r of results) grid.appendChild(resultCard(slug, r));
      searchStatus(`${results.length} image(s) from the page — click to add.`);
    } else {
      searchStatus(`<span class="spin"></span> Adding ${action}…`);
      const r = await api('/api/media/add', { slug, url, action, source: 'manual', sourceUrl: url });
      searchStatus(r.duplicate ? 'Already in the queue.' : 'Added to review queue.');
      $('manualUrl').value = '';
      load(slug);
    }
  } catch (x) { searchStatus(x.message, true); }
  $('addUrlBtn').disabled = false;
};

// deep-link: ?slug=a24
const qs = new URLSearchParams(location.search);
if (qs.get('slug')) { $('slug').value = qs.get('slug'); load(qs.get('slug')); loadChips(qs.get('slug')); }
$('loadBtn').addEventListener('click', () => loadChips($('slug').value.trim()));
</script>
