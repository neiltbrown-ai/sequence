    }
  } catch (err) {
    alert(`Failed: ${err.message}`);
  }
}

// Lightbox
let lightboxState = { blockId: null, imageId: null };

function openLightbox(blockId, imageId) {
  const block = contentBlocks.find(b => b.id === blockId);
  if (!block) return;
  const img = getAllImages(block).find(i => i.id === imageId);
  if (!img) return;

  lightboxState = { blockId, imageId };

  document.getElementById('lightboxImg').src = img.full;
  document.getElementById('lightboxRes').textContent = 'Loading...';
  document.getElementById('lightboxMeta').innerHTML =
    `${escapeHtml(img.photographer)} · ${escapeHtml(img.source)} · <a href="${escapeHtml(img.sourceUrl)}" target="_blank" rel="noopener">source page</a>`;

  const currentRole = block.selected.get(imageId);
  const actions = document.getElementById('lightboxActions');

  // If block has slots (from content picker), show slot-specific buttons
  if (block.slots && block.slots.length > 0) {
    const slotColors = { hero: 'var(--gold)', secondary: '#9B8FE8', cover: '#7EB8DA' };
    actions.innerHTML = block.slots.map(slot => {
      const color = slotColors[slot.role] || '#7EB8DA';
      const isActive = currentRole === slot.role ? ' style="outline: 2px solid var(--light); outline-offset: 2px;"' : '';
      return `<button class="lightbox-role-btn ${slot.role}"${isActive} onclick="assignRole('${slot.role}')" style="background: ${color}; color: var(--dark);">${escapeHtml(slot.label)}</button>`;
    }).join('') +
    (currentRole ? '<button class="lightbox-role-btn remove" onclick="assignRole(null)">Remove</button>' : '');
  } else {
    // No slots — show standard roles PLUS inline slot buttons and a file-link prompt
    const activeStyle = (r) => currentRole === r ? ' style="outline: 2px solid var(--light); outline-offset: 2px;"' : '';
    let btns = `
      <button class="lightbox-role-btn hero"${activeStyle('hero')} onclick="assignRole('hero')">Hero</button>
      <button class="lightbox-role-btn secondary"${activeStyle('secondary')} onclick="assignRole('secondary')">Secondary</button>
      <button class="lightbox-role-btn cover"${activeStyle('cover')} onclick="assignRole('cover')">Cover</button>`;
    // Add slot-1 through slot-6 for article inline images
    for (let n = 1; n <= 6; n++) {
      const role = `slot-${n}`;
      btns += `<button class="lightbox-role-btn ${role}"${activeStyle(role)} onclick="assignRole('${role}')" style="background:#7EB8DA; color:var(--dark);">Slot ${n}</button>`;
    }
    btns += `<button class="lightbox-role-btn saved"${activeStyle('saved')} onclick="assignRole('saved')">Save</button>`;
    btns += currentRole ? '<button class="lightbox-role-btn remove" onclick="assignRole(null)">Remove</button>' : '';
    // Add file-link hint
    btns += `<div style="width:100%; margin-top:8px; font-family:var(--font-mono); font-size:9px; color:#555;">
      Link to a content file for exact slots:
      <select id="lightbox-file-link" onchange="lightboxLinkFile(this.value)"
        style="background:var(--deep); color:var(--light); border:1px solid var(--slate); font-size:9px; padding:2px 4px; font-family:var(--font-mono); max-width:240px; margin-left:4px;">
        <option value="">None</option>
      </select>
    </div>`;
    actions.innerHTML = btns;
    // Populate file link dropdown in lightbox
    populateLightboxFileLink(block);
  }

  // Show/hide position selector based on current role
  updateLightboxPositionVisibility(block, imageId);

  document.getElementById('lightbox').classList.add('open');
}

function updateLightboxPositionVisibility(block, imageId) {
  const role = block.selected.get(imageId);
  const posContainer = document.getElementById('lightboxPosition');
  const posSelect = document.getElementById('lightboxPositionSelect');
  if (role === 'hero' || role === 'secondary') {
    posContainer.style.display = '';
    posSelect.value = block.positions.get(imageId) || '';
  } else {
    posContainer.style.display = 'none';
  }
}

function updateLightboxPosition(value) {
  const { blockId, imageId } = lightboxState;
  const block = contentBlocks.find(b => b.id === blockId);
  if (!block) return;
  if (value) {
    block.positions.set(imageId, value);
  } else {
    block.positions.delete(imageId);
  }
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightboxImg').src = '';
  document.getElementById('lightboxPosition').style.display = 'none';
  lightboxState = { blockId: null, imageId: null };
}

function assignRole(role) {
  const { blockId, imageId } = lightboxState;
  const block = contentBlocks.find(b => b.id === blockId);
  if (!block) return;

  if (role === null) {
    block.selected.delete(imageId);
    block.positions.delete(imageId);
  } else {
    block.selected.set(imageId, role);
  }

  // Update position selector visibility without closing lightbox
  updateLightboxPositionVisibility(block, imageId);

  closeLightbox();
  renderBlocks();
}

// Populate file link dropdown inside lightbox
async function populateLightboxFileLink(block) {
  const select = document.getElementById('lightbox-file-link');
  if (!select) return;
  // Use cached file list or fetch
  if (!fileLinkCache) {
    try {
      const res = await fetch('/api/content');
      if (res.ok) {
        const data = await res.json();
        fileLinkCache = data.files;
      }
    } catch {}
  }
  if (!fileLinkCache) return;
  select.innerHTML = '<option value="">None</option>' +
    fileLinkCache.map(f => {
      const typeLabel = f.type === 'case-studies' ? 'CS' : f.type === 'articles' ? 'ART' : 'STR';
      const slotInfo = `${f.filledSlots}/${f.totalSlots}`;
      const selected = (block.linkedFile === f.path || block.contentFile === f.path) ? ' selected' : '';
      return `<option value="${escapeHtml(f.path)}"${selected}>[${typeLabel}] ${escapeHtml(f.title)} (${slotInfo})</option>`;
    }).join('');
}

// Link file from lightbox — links the block and re-opens lightbox with slot buttons
async function lightboxLinkFile(filePath) {
  const { blockId, imageId } = lightboxState;
  if (!blockId) return;
  await linkBlockToFile(blockId, filePath);
  // Re-open lightbox to refresh buttons with slot info
  if (imageId) openLightbox(blockId, imageId);
}

// Close lightbox on Escape
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeLightbox();
});

// ===== Pick Content Workflow =====
let pickFiles = [];
let pickSelectedFile = null;

async function loadPickFiles() {
  try {
    const res = await fetch('/api/content');
    if (!res.ok) throw new Error();
    const data = await res.json();
    pickFiles = data.files;
  } catch {
    pickFiles = [];
  }
  filterPickFiles();
}

function filterPickFiles() {
  const typeFilter = document.getElementById('pickTypeFilter').value;
  const search = document.getElementById('pickSearch').value.toLowerCase();
  const fileSelect = document.getElementById('pickFileSelect');

  const filtered = pickFiles.filter(f => {
    if (typeFilter && f.type !== typeFilter) return false;
    if (search && !f.title.toLowerCase().includes(search)) return false;
    return true;
  });

  fileSelect.innerHTML = filtered.map(f => {
    const typeLabel = f.type === 'case-studies' ? 'CS' : f.type === 'articles' ? 'ART' : 'STR';
    const slotStatus = f.totalSlots > 0 ? ` [${f.filledSlots}/${f.totalSlots} images]` : '';
    return `<option value="${escapeHtml(f.path)}">[${typeLabel}] ${escapeHtml(f.title)}${slotStatus}</option>`;
  }).join('');

  pickSelectedFile = null;
  document.getElementById('pickSlotPreview').innerHTML = '';
  document.getElementById('pickSubmitBtn').disabled = true;
}

async function onPickFileChange() {
  const filePath = document.getElementById('pickFileSelect').value;
  if (!filePath) return;

  const file = pickFiles.find(f => f.path === filePath);
  if (!file) return;

  pickSelectedFile = file;
  document.getElementById('pickSubmitBtn').disabled = false;

  // Show slot preview
  const preview = document.getElementById('pickSlotPreview');
  if (file.slots && file.slots.length > 0) {
    preview.innerHTML = `
      <div style="font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em;">
        ${file.totalSlots} image slots — ${file.filledSlots} filled, ${file.totalSlots - file.filledSlots} empty
      </div>
      <div class="slot-preview-grid">
        ${file.slots.map(slot => {
          const isFilled = !!slot.current;
          return `
            <div class="slot-preview-card">
              <div class="slot-role">${escapeHtml(slot.role)}</div>
              <div class="slot-label">${escapeHtml(slot.label)}</div>
              <div class="slot-status ${isFilled ? 'filled' : 'empty'}">${isFilled ? 'Filled' : 'Empty'}</div>
              ${slot.context ? `<div style="color: var(--muted); font-size: 9px; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${escapeHtml(slot.context)}">${escapeHtml(slot.context.slice(0, 60))}...</div>` : ''}
            </div>`;
        }).join('')}
      </div>`;
  } else {
    preview.innerHTML = `<div style="font-family: var(--font-mono); font-size: 11px; color: var(--muted);">No image slots detected</div>`;
  }
}

async function submitPickContent() {
  if (!pickSelectedFile) return;

  const file = pickSelectedFile;
  const block = {
    id: Date.now(),
    type: file.type === 'case-studies' ? 'case study' : file.type === 'articles' ? 'article' : 'structure',
    title: file.title,
    excerpt: file.excerpt || '',
    queries: [],
    results: {},
    selected: new Map(),
    positions: new Map(),
    slots: file.slots || [],
    slotQueries: null,
    contentFile: file.path
  };

  contentBlocks.unshift(block);
  togglePanel('pickPanel');
  renderBlocks();

  // Generate per-slot queries
  if (block.slots.length > 0 && serverOnline) {
    block.status = 'generating';
    renderBlocks();

    try {
      const res = await fetch('/api/queries/slots', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          type: file.type,
          title: file.title,
          excerpt: file.excerpt,
          discipline: file.discipline || '',
          slots: block.slots
        })
      });

      if (!res.ok) throw new Error(`Server returned ${res.status}`);
      const data = await res.json();
      block.slotQueries = data.slotQueries;

      // Flatten all slot queries into one list for searching
      const allQueries = [];
      for (const queries of Object.values(data.slotQueries)) {
        for (const q of queries) {
          if (!allQueries.includes(q)) allQueries.push(q);
        }
      }
      block.queries = allQueries;
      block.status = 'searching';
      renderBlocks();
      await searchImages(block);
    } catch (err) {
      console.error('Slot query generation error:', err);
      block.status = 'error';
      block.error = err.message;
      renderBlocks();
    }
  } else {
    // Fallback to original query generation
    await generateQueries(block);
  }
}

// Auto-load pick files when panel opens
const origTogglePanel = togglePanel;
togglePanel = function(id) {
  origTogglePanel(id);
  if (id === 'pickPanel' && document.getElementById('pickPanel').classList.contains('open')) {
    loadPickFiles();
  }
};

// When block has a contentFile, auto-set it in send-to-content
const origOpenSendToContent = openSendToContent;
openSendToContent = async function() {
  await origOpenSendToContent();

  // If the selected block has a contentFile, pre-select it
  const blockIdVal = document.getElementById('sendBlockSelect').value;
  const block = blockIdVal === 'all' ? null : contentBlocks.find(b => b.id === parseInt(blockIdVal));
  if (block && block.contentFile) {
    const fileSelect = document.getElementById('sendFileSelect');
    for (let i = 0; i < fileSelect.options.length; i++) {
      if (fileSelect.options[i].value === block.contentFile) {
        fileSelect.selectedIndex = i;
        break;
      }
    }
    updateSendPreview();
  }
};

// Util
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
